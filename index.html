<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OEE Coleta</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg-base: #f8f9fa;
      --surface: #ffffff;
      --accent-blue: #1a6fd4;
      --accent-blue-light: #e8f0fe;
      --t2-amber: #f59e0b;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --shadow-light: 0 2px 6px rgba(0,0,0,0.04);
      --shadow-export: 0 4px 10px rgba(26, 111, 212, 0.25);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.5;
      padding-bottom: 40px;
    }
    .top-bar {
      background-color: var(--accent-blue);
      color: #fff;
      padding: 16px 20px;
      font-size: 1.15rem;
      font-weight: 600;
      text-align: center;
      position: sticky; top: 0; z-index: 10;
      box-shadow: var(--shadow-light);
    }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .progress-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-light);
    }
    .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
    .progress-track { background: #e5e7eb; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 16px; }
    .progress-fill { height: 100%; background: var(--accent-blue); width: 0%; transition: width 0.3s ease; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
    .stat-box { background: var(--accent-blue-light); padding: 12px 8px; border-radius: 8px; }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--accent-blue); }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
    .btn-export {
      width: 100%;
      background: var(--accent-blue);
      color: #fff;
      border: none;
      padding: 16px;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow-export);
      transition: transform 0.1s ease;
      margin-bottom: 24px;
    }
    .btn-export:active { transform: scale(0.98); }
    .machine-list { list-style: none; }
    .machine-item {
      background: var(--surface);
      padding: 16px;
      border-radius: var(--radius);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-light);
    }
    .machine-left { display: flex; align-items: center; gap: 12px; }
    .checkmark { color: var(--accent-blue); font-weight: 700; font-size: 1.1rem; }
    .chip {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #fff;
    }
    .chip-t1 { background: var(--accent-blue); }
    .chip-t2 { background: var(--t2-amber); }
    .btn-remove {
      background: none; border: none; color: var(--text-secondary);
      font-size: 0.85rem; cursor: pointer; padding: 6px 10px;
    }
    .btn-add {
      width: 100%; background: var(--surface); color: var(--accent-blue);
      border: 1px solid var(--accent-blue); padding: 14px; border-radius: var(--radius);
      font-weight: 600; cursor: pointer; margin-top: 8px;
    }
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      align-items: center; justify-content: center; padding: 20px; z-index: 50;
    }
    .modal-card {
      background: var(--surface); width: 100%; max-width: 380px;
      padding: 24px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.9rem; }
    .form-input, .form-select {
      width: 100%; padding: 12px; border: 1.5px solid #d1d5db; border-radius: 10px;
      font-size: 1rem; background: #fff; transition: all 0.2s;
    }
    .form-input.filled, .form-select.filled {
      background-color: var(--accent-blue-light);
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }
    .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    .btn-modal-cancel { flex: 1; padding: 12px; background: #f3f4f6; border: none; border-radius: 10px; font-weight: 500; cursor: pointer; }
    .btn-modal-add { flex: 1; padding: 12px; background: var(--accent-blue); color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <header class="top-bar">OEE Coleta</header>
  <main class="container">
    <section class="progress-card">
      <div class="progress-header">
        <span><span id="countDone">0</span> de 20 máquinas preenchidas</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-value" id="statDone">0</div><div class="stat-label">Concluídas</div></div>
        <div class="stat-box"><div class="stat-value" id="statPending">20</div><div class="stat-label">Pendentes</div></div>
        <div class="stat-box"><div class="stat-value" id="statBoxes">0</div><div class="stat-label">Caixas</div></div>
      </div>
    </section>
    <button class="btn-export" onclick="exportExcel()">Exportar Excel</button>
    <ul class="machine-list" id="machineList"></ul>
    <button class="btn-add" onclick="openModal()">+ Adicionar máquina</button>
  </main>
  <div class="modal-overlay" id="addModal">
    <div class="modal-card">
      <h3 style="margin-bottom:16px; color:var(--accent-blue);">Adicionar máquina</h3>
      <div class="form-group">
        <label>Identificação</label>
        <input type="text" class="form-input" id="inputName" placeholder="Ex: M_221" oninput="toggleFilled(this)">
      </div>
      <div class="form-group">
        <label>Turno</label>
        <select class="form-select" id="inputShift" onchange="toggleFilled(this)">
          <option value="" disabled selected>Selecione</option>
          <option value="T1">T1</option>
          <option value="T2">T2</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-modal-add" onclick="addMachine()">Adicionar</button>
      </div>
    </div>
  </div>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    function toggleFilled(el) { el.classList.toggle('filled', el.value && el.value !== ''); }
    function openModal() { document.getElementById('addModal').style.display = 'flex'; }
    function closeModal() { 
      document.getElementById('addModal').style.display = 'none'; 
      document.getElementById('inputName').value = ''; 
      document.getElementById('inputShift').value = ''; 
      document.querySelectorAll('.filled').forEach(el => el.classList.remove('filled'));
    }
    function addMachine() {
      const name = document.getElementById('inputName').value.trim();
      const shift = document.getElementById('inputShift').value;
      if (!name || !shift) return alert('Preencha os campos');
      const li = document.createElement('li');
      li.className = 'machine-item';
      li.innerHTML = `<div class="machine-left"><span class="checkmark">✓</span><strong>${name}</strong><span class="chip ${shift==='T1'?'chip-t1':'chip-t2'}">${shift}</span></div><button class="btn-remove" onclick="this.closest('li').remove()">Remover</button>`;
      document.getElementById('machineList').appendChild(li);
      updateProgress();
      closeModal();
    }
    function updateProgress() {
      const total = 20;
      const done = document.querySelectorAll('.machine-item').length;
      const percent = Math.round((done / total) * 100);
      document.getElementById('progressBar').style.width = percent + '%';
      document.getElementById('progressPercent').textContent = percent + '%';
      document.getElementById('statDone').textContent = done;
      document.getElementById('statPending').textContent = total - done;
      document.getElementById('countDone').textContent = done;
      document.getElementById('statBoxes').textContent = done;
    }
    function exportExcel() { alert('Exportando... (integrar SheetJS)'); }
  </script>
</body>
</html>
